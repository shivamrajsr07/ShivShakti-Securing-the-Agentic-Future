services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: sqlite:////app/data/shivshakti.db
    ports:
      - "8000:8000"
    volumes:
      - shivshakti-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  shivshakti-data:
